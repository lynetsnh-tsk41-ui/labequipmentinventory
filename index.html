<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Інвентар лабораторного обладнання</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./src/styles.css" />
</head>
<body>
  <div class="app-container">
    <header class="top-bar">
      <div class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-flask-conical"><path d="M10 2v7.31"/><path d="M14 9.3V1.99"/><path d="M8.5 2h7"/><path d="M14 9.3a6.5 6.5 0 1 1-4 0"/><path d="M5.52 16h12.96"/></svg>
        <span>LabInventory</span>
      </div>
      <nav class="tabs">
        <button id="tab-inventory" class="tab active">Інвентар</button>
        <button id="tab-history" class="tab">Історія операцій</button>
      </nav>
      <div class="actions">
        <button id="reset-demo" class="btn btn-secondary">Скинути демо-дані</button>
        <button id="btn-add-equipment" class="btn btn-primary">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
          Додати обладнання
        </button>
      </div>
    </header>

    <div class="stats-panel" id="stats-panel">
      <!-- Stats will be rendered here -->
    </div>

    <main class="main-content">
      <!-- Inventory View -->
      <section id="view-inventory" class="view active">
        <div class="filters-bar">
          <div class="search-box">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            <input type="text" id="search-input" placeholder="Пошук за назвою або інв. номером..." />
          </div>
          <div class="filter-group">
            <select id="filter-category">
              <option value="">Всі категорії</option>
              <!-- Categories dynamically filled -->
            </select>
            <select id="filter-status">
              <option value="">Всі статуси</option>
              <option value="Available">Доступно</option>
              <option value="Issued">Видано</option>
              <option value="Maintenance">На обслуговуванні</option>
            </select>
            <select id="sort-select">
              <option value="date-desc">Спочатку нові</option>
              <option value="date-asc">Спочатку старі</option>
              <option value="name-asc">За назвою (А-Я)</option>
              <option value="name-desc">За назвою (Я-А)</option>
              <option value="inv-asc">Інв. номер (зростання)</option>
              <option value="inv-desc">Інв. номер (спадання)</option>
            </select>
            <button id="btn-clear-filters" class="btn btn-icon" title="Очистити фільтри">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>
            </button>
          </div>
        </div>

        <div class="equipment-list" id="equipment-list">
          <!-- Equipment cards rendered here -->
        </div>
      </section>

      <!-- History View -->
      <section id="view-history" class="view">
        <div class="filters-bar">
          <div class="search-box">
             <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            <input type="text" id="history-search-input" placeholder="Фільтр за інв. номером або ID..." />
          </div>
        </div>
        <div class="history-list" id="history-list">
          <!-- Log entries rendered here -->
        </div>
      </section>
    </main>
  </div>

  <!-- Modal for Adding/Editing Equipment -->
  <div id="modal-equipment" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modal-title">Додати обладнання</h2>
        <button class="btn-close-modal">×</button>
      </div>
      <form id="form-equipment">
        <input type="hidden" id="eq-id" />
        <div class="form-group">
          <label for="eq-name">Назва обладнання *</label>
          <input type="text" id="eq-name" required minlength="3" maxlength="100" />
          <span class="error-msg" id="err-eq-name"></span>
        </div>
        <div class="form-group">
          <label for="eq-inv">Інвентарний номер *</label>
          <input type="text" id="eq-inv" required minlength="3" maxlength="30" />
          <span class="error-msg" id="err-eq-inv"></span>
        </div>
        <div class="form-group">
          <label for="eq-category">Категорія *</label>
          <input type="text" id="eq-category" required minlength="2" maxlength="50" list="category-list" />
          <datalist id="category-list"></datalist>
          <span class="error-msg" id="err-eq-category"></span>
        </div>
        <div class="form-group">
          <label for="eq-desc">Опис</label>
          <textarea id="eq-desc" maxlength="500"></textarea>
          <span class="error-msg" id="err-eq-desc"></span>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary btn-close-modal">Скасувати</button>
          <button type="submit" class="btn btn-primary">Зберегти</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal for Issuing/Returning -->
  <div id="modal-action" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="action-title">Дія з обладнанням</h2>
        <button class="btn-close-action">×</button>
      </div>
      <form id="form-action">
        <input type="hidden" id="action-eq-id" />
        <div class="form-group" id="group-assignee">
          <label for="action-assignee">ПІБ отримувача *</label>
          <input type="text" id="action-assignee" minlength="3" maxlength="50" />
          <span class="error-msg" id="err-action-assignee"></span>
        </div>
        <div class="form-group hidden" id="group-return-type">
          <label>Куди повернути?</label>
          <div class="radio-group">
             <label><input type="radio" name="returnType" value="Available" checked> На склад (Доступно)</label>
             <label><input type="radio" name="returnType" value="Maintenance"> На обслуговування</label>
          </div>
        </div>
        <div class="form-group" id="group-action-comment">
          <label for="action-comment">Коментар (опціонально)</label>
          <input type="text" id="action-comment" maxlength="200" />
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary btn-close-action">Скасувати</button>
          <button type="submit" class="btn btn-primary" id="btn-submit-action">Підтвердити</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Confirmation Modal -->
  <div id="modal-confirm" class="modal hidden">
    <div class="modal-content modal-sm">
      <div class="modal-header">
        <h2>Підтвердження</h2>
      </div>
      <div class="modal-body">
        <p id="confirm-text">Ви впевнені?</p>
      </div>
      <div class="modal-footer">
        <button type="button" id="btn-confirm-cancel" class="btn btn-secondary">Скасувати</button>
        <button type="button" id="btn-confirm-ok" class="btn btn-danger">Видалити</button>
      </div>
    </div>
  </div>

  <script src="./src/app.js" defer></script>
</body>
</html>
